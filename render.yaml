services:
  - type: web
    name: poker-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit

  - type: web
    name: poker-web
    runtime: static
    rootDir: app
    buildCommand: npm install && npx expo export -p web
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
